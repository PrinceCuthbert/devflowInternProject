<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuickTask: Project To-Do List</title>
    <!-- Google Fonts for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="todo-container">
      <!-- Sleek Top Nav Bar from mockup -->
      <div class="top-nav">
        <button class="nav-btn menu-btn" aria-label="Menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <span class="app-title">Dev-Flow</span>
        <button class="nav-btn search-btn" aria-label="Search">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </button>
      </div>

      <div class="app-layout">
        <div class="left-panel">
          <!-- Header section with title, counter, and actions -->
          <div class="header-section">
            <div class="title-area">
              <h1>Dev Flow</h1>
              <span id="project-count" class="project-count">0/0</span>
            </div>
          </div>

          <form id="todo-form" class="input-section">
            <div class="input-wrapper">
              <span class="plus-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              </span>
              <input
                type="text"
                id="todo-input"
                placeholder="Add a task here..."
                required />
            </div>
            <button type="submit" class="save-btn">Save</button>
          </form>

          <ul id="todo-list" class="todo-list">
            <li class="loading-msg">Connecting to Express Server...</li>
          </ul>
        </div>

        <div class="right-panel">
          <div id="trash-bucket" class="trash-bucket-container">
            <p class="trash-text">Drag here to delete</p>

            <div class="trash-can">
              <!-- SVG trash can replacing the old nested div structure for a sharper, cleaner render -->
              <svg class="trash-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path class="trash-lid-svg" d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                <line x1="10" y1="11" x2="10" y2="17"></line>
                <line x1="14" y1="11" x2="14" y2="17"></line>
              </svg>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
